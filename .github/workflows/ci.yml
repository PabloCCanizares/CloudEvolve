name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build & test (JDK 17)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # MT.jar is a system-scoped dependency committed under lib/, so the build
      # needs no extra setup. cloudsimStorage.jar (the simulator backend) is only
      # required for full evolution runs, not for `mvn test`.
      - name: Run unit & smoke tests with coverage
        run: mvn -B --no-transfer-progress test

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: warn
